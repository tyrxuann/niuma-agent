# Niuma Agent Configuration
#
# All API keys should be provided via environment variables.
# Use ${VAR_NAME} syntax for environment variable expansion.

llm:
  default: "claude"
  providers:
    claude:
      api_key: "${CLAUDE_API_KEY}"
      model: "claude-sonnet-4-6"
    openai:
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4o"

mcp_servers:
  playwright:
    command: "npx"
    args: ["-y", "@playwright/mcp"]
    env:
      HEADLESS: "true"

# Logging configuration
logging:
  # Log level: trace, debug, info, warn, error
  level: "info"
  # Directory for log files
  logs_dir: "./data/logs"
  # Log file name (within logs_dir)
  log_file: "niuma.log"
  # Maximum log file size in MB before rotation
  max_file_size_mb: 10
  # Maximum number of rotated log files to keep
  max_files: 5

storage:
  schedules_dir: "./data/schedules"
  cache_dir: "./data/cache"
  logs_dir: "./data/logs"
